appId: com.goatroyalty.app
productName: GOAT Royalty App
copyright: Copyright © 2024 HARVEY L MILLER JR / JUAQUIN J MALPHURS / KEVIN W HALLINGQUEST. All rights reserved.

directories:
  buildResources: build
  output: dist

files:
  - main.js
  - preload.js
  - start-server.js
  - .next/**/*
  - public/**/*
  - pages/**/*
  - components/**/*
  - styles/**/*
  - lib/**/*
  - node_modules/**/*
  - package.json
  - next.config.js
  - '!**/.next/cache/**/*'

# Windows Configuration
win:
  icon: public/icon.ico
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
    - target: zip
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  installerIcon: public/icon.ico
  uninstallerIcon: public/icon.ico
  installerHeaderIcon: public/icon.ico
  artifactName: ${productName}-Setup-${version}.${ext}

portable:
  artifactName: ${productName}-Portable-${version}.exe

# macOS Configuration
mac:
  icon: public/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Linux Configuration
linux:
  icon: public/icons
  category: Office
  maintainer: Harvey L Miller Jr <harvey@goatroyaltyapp.com>
  desktop:
    Name: GOAT Royalty App
    Comment: Music royalty management platform for artists and rights holders
    Categories: Office;Finance;Audio
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
    - target: tar.gz
      arch:
        - x64

appImage:
  artifactName: ${productName}-${version}-${arch}.AppImage

deb:
  artifactName: ${productName}_${version}_${arch}.deb
  priority: optional

# Publish Configuration (GitHub Releases)
publish:
  provider: github
  owner: BrickSquadMonopoly
  repo: GOAT-Royalty-App2
  releaseType: release